<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE TRIAGEM - CRAS SISTEMA TESTE PARA COMPUTADOR SEM NECESSIDADE DE PROVEDOR, REDE OU SERVIODR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
        --primary: #2c3e50; 
        --secondary: #34495e; 
        --accent: #3498db;
        --success: #27ae60; 
        --danger: #e74c3c; 
        --light: #f4f7f6;
        --warning: #f39c12;
        --purple: #8e44ad; /* Nova cor exemplo */
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h1, h2 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .header-logo { border-bottom: 3px solid var(--accent); margin-bottom: 25px; padding-bottom: 10px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.85em; color: var(--secondary); }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; transition: 0.3s; font-size: 0.9em; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .btn-add { background: var(--success); color: white; width: 100%; font-size: 1.1em; margin-bottom: 20px; }
        .btn-pdf { background: #d32f2f; color: white; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn-chart { background: var(--accent); color: white; }
        .btn-backup { background: var(--warning); color: white; }
        .btn-import { background: #8e44ad; color: white; }
        .btn-delete { background: none; color: var(--danger); border: none; cursor: pointer; font-size: 1.2em; }

        .dashboard { display: none; margin-top: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .chart-container { grid-template-columns: 1fr; } }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.85em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: var(--primary); color: white; }

        .summary-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 20px; }
        .card { padding: 15px; background: #eef2f3; border-radius: 8px; text-align: center; border-left: 5px solid var(--accent); }

        .logo-container { display: flex; justify-content: center; padding: 20px; }
        .logo-cras { display: flex; flex-direction: column; align-items: center; border-left: 8px solid #2c3e50; padding-left: 15px; }
        .sigla { font-size: 48px; font-weight: 900; color: #2c3e50; line-height: 1; }
        .nome { font-size: 20px; color: #3498db; text-transform: uppercase; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-logo">
            <div class="logo-container">
                <div class="logo-cras">
                    <span class="sigla">CRAS</span>
                    <span class="nome">CRAS SISTEMA TESTE PARA COMPUTADOR SEM NECESSIDADE DE PROVEDOR, REDE OU SERVIODR</span>
                </div>
            </div>
            <h1>Sistema de Triagem</h1>
        </div>

        <form id="formTriagem">
            <div class="form-grid">
                <div class="input-box"><label>Nº SENHA</label><input type="number" id="senha" required></div>
                <div class="input-box"><label>CPF</label><input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required></div>
                <div class="input-box"><label>CÓD. FAMÍLIA</label><input type="text" id="codFamilia" placeholder="Opcional"></div>
                <div class="input-box"><label>NOME COMPLETO</label><input type="text" id="nome" required></div>
                <div class="input-box">
                    <label>SETOR DESTINO</label>
                    <select id="setor" required>
                        <option value="">Selecione...</option>
                        <option value="CADASTRO ÚNICO">CADASTRO ÚNICO</option>
                        <option value="ASSISTENTE SOCIAL">ASSISTENTE SOCIAL</option>
                        <option value="PSICOLOGA">PSICÓLOGA</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>SERVIÇO ESPECÍFICO</label>
                    <select id="servico" required>
                        <option value="">Selecionar Atendimento</option>
                        <option value="Atualização">Atualização</option>
                        <option value="Novo Cadastro">Novo Cadastro</option>
                        <option value="Cesta Básica">Cesta Básica</option>
                        <option value="Consulta">Consulta</option>
                        <option value="Encaminhamento">Encaminhamento</option>
                        <option value="Vale Transporte">Vale Transporte</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-add">REGISTRAR ATENDIMENTO</button>
        </form>

        <div class="btn-group">
            <button onclick="gerarRelatorioPDF()" class="btn-pdf">📄 PDF Detalhado</button>
            <button onclick="gerarRelatorioGraficos()" class="btn-chart" style="background: #607d8b;">📊 PDF com Gráficos</button>
            <button onclick="exportarExcel()" class="btn-excel">📈 Excel</button>
            <button onclick="toggleDashboard()" class="btn-chart">🖥️ Ver Painel</button>
             <button onclick="limparBancoCompleto()" style="background:#95a5a6; color:white">🗑️ Limpar Banco</button>
            <button onclick="salvarBackup()" class="btn-backup">💾 Backup</button>
            <button onclick="document.getElementById('fileInput').click()" class="btn-import">📥 Importar</button>
            <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importarBackup(event)">
        </div>

        <div id="dashboard" class="dashboard">
            <h2>Análise de Produtividade</h2>
            <div class="chart-container">
                <div><canvas id="chartSetores"></canvas></div>
                <div><canvas id="chartServicos"></canvas></div>
            </div>
            <div class="summary-box" id="summaryBox"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 8%;">Senha</th>
                    <th style="width: 15%;">Data/Hora</th>
                    <th style="width: 10%;">Cód. Fam</th>
                    <th style="width: 25%;">Cidadão</th>
                    <th style="width: 17%;">Setor</th>
                    <th style="width: 12%;">Serviço</th>
                    <th style="width: 8%;">Ação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <script>
        const DB_NAME = 'triagem_ana_rosa';
        let grafSetores = null;
        let grafServicos = null;

        // Formatação de CPF
        document.getElementById('cpf').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });

        function carregarDados() {
            const dados = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            dados.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach((atend) => {
                corpo.innerHTML += `<tr>
                    <td><strong>${atend.senha}</strong></td>
                    <td>${atend.dataHora}</td>
                    <td>${atend.codFamilia || '-'}</td>
                    <td>${atend.nome}</td>
                    <td>${atend.setor}</td>
                    <td>${atend.servico}</td>
                    <td><button class="btn-delete" onclick="excluirRegistro(${atend.id})">🗑️</button></td>
                </tr>`;
            });
            atualizarCards();
        }

        document.getElementById('formTriagem').addEventListener('submit', (e) => {
            e.preventDefault();
            const agora = new Date();
            const registro = {
                id: Date.now(),
                senha: document.getElementById('senha').value.padStart(3, '0'),
                timestamp: agora.toISOString(),
                dataHora: agora.toLocaleString('pt-BR'),
                cpf: document.getElementById('cpf').value,
                codFamilia: document.getElementById('codFamilia').value,
                nome: document.getElementById('nome').value.toUpperCase(),
                setor: document.getElementById('setor').value,
                servico: document.getElementById('servico').value
            };
            const banco = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            banco.push(registro);
            localStorage.setItem(DB_NAME, JSON.stringify(banco));
            e.target.reset();
            carregarDados();
            if(document.getElementById('dashboard').style.display === 'block') renderizarGraficos();
        });

        function excluirRegistro(id) {
            if (confirm("Excluir este registro?")) {
                let banco = JSON.parse(localStorage.getItem(DB_NAME)) || [];
                banco = banco.filter(item => item.id !== id);
                localStorage.setItem(DB_NAME, JSON.stringify(banco));
                carregarDados();
            }
        }

        // --- CORREÇÃO DA GERAÇÃO DE PDF (QUEBRA DE PÁGINA) ---
        function verificarQuebra(doc, y, limite = 275) {
            if (y > limite) {
                doc.addPage();
                return 20; // Nova margem superior
            }
            return y;
        }

        function gerarRelatorioPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const dados = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            const dataEmissao = new Date().toLocaleString('pt-BR');

            // Cabeçalho institucional
            doc.setFontSize(14);
            doc.text("ESTADO DO PARANÁ", 105, 15, { align: 'center' });
            doc.setFontSize(12);
            doc.text("SECRETARIA MUNICIPAL DE ASSISTÊNCIA SOCIAL", 105, 22, { align: 'center' });
            doc.text("UNIDADE: CRAS ANA ROSA - RELATÓRIO TÉCNICO DE TRIAGEM", 105, 29, { align: 'center' });
            doc.setFontSize(10);
            doc.text(`Emissão: ${dataEmissao}`, 14, 40);

            doc.autoTable({
                startY: 45,
                head: [['Data/Hora', 'Senha', 'Cód. Fam', 'Cidadão', 'Setor', 'Serviço']],
                body: dados.map(i => [i.dataHora, i.senha, i.codFamilia || '-', i.nome, i.setor, i.servico]),
                headStyles: { fillColor: [44, 62, 80], fontSize: 9 },
                styles: { fontSize: 8 }
            });

            let finalY = doc.lastAutoTable.finalY + 15;
            finalY = verificarQuebra(doc, finalY);

            doc.setFont(undefined, 'bold');
            doc.text("APURAÇÃO MENSURADA POR UNIDADE TÉCNICA E SERVIÇO:", 14, finalY);
            doc.setFont(undefined, 'normal');
            
            const setores = [...new Set(dados.map(d => d.setor))];
            const totalGeral = dados.length;

            setores.forEach(setor => {
                finalY += 10;
                finalY = verificarQuebra(doc, finalY);

                const atendSetor = dados.filter(d => d.setor === setor);
                const percSetor = ((atendSetor.length / totalGeral) * 100).toFixed(1);
                
                doc.setFont(undefined, 'bold');
                doc.text(`> ${setor}: ${atendSetor.length} atendimentos totais (${percSetor}%).`, 20, finalY);
                doc.setFont(undefined, 'normal');

                const servicos = [...new Set(atendSetor.map(s => s.servico))];
                servicos.forEach(serv => {
                    finalY += 7;
                    finalY = verificarQuebra(doc, finalY);
                    const qtdServ = atendSetor.filter(s => s.servico === serv).length;
                    const percServ = ((qtdServ / atendSetor.length) * 100).toFixed(1);
                    doc.text(`- ${serv}: ${qtdServ} casos atendidos (${percServ}% do setor).`, 25, finalY);
                });
            });

            doc.save(`Relatorio_CRAS_Ana_Rosa.pdf`);
        }

        // --- RELATÓRIO DE GRÁFICOS COMPLETO ---
       async function gerarRelatorioGraficos() {
    const dashboard = document.getElementById('dashboard');
    const visualOriginal = dashboard.style.display;
    dashboard.style.display = 'block'; 
    renderizarGraficos();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const dados = JSON.parse(localStorage.getItem(DB_NAME)) || [];
    const totalGeral = dados.length;

    // Cabeçalho do PDF
    doc.setFontSize(16);
    doc.setFont(undefined, 'bold');
    doc.text("RELATÓRIO DE INDICADORES OPERACIONAIS - CRAS ANA ROSA", 105, 20, { align: 'center' });
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text(`Gerado em: ${new Date().toLocaleString()}`, 105, 26, { align: 'center' });

    // --- SEÇÃO 1: GRÁFICO DE SETORES ---
    const imgSetores = document.getElementById('chartSetores').toDataURL("image/png", 1.0);
    doc.setFont(undefined, 'bold');
    doc.text("1. Volume por Unidade Técnica (Valores Absolutos)", 14, 40);
    doc.addImage(imgSetores, 'PNG', 15, 45, 180, 70);

    // Texto de Apoio (Valores Mensurados dos Setores)
    let yPos = 125;
    doc.setFontSize(9);
    const setoresLab = ["CADASTRO ÚNICO", "ASSISTENTE SOCIAL", "PSICOLOGA"];
    setoresLab.forEach(s => {
        const qtd = dados.filter(d => d.setor === s).length;
        const perc = totalGeral > 0 ? ((qtd / totalGeral) * 100).toFixed(1) : 0;
        doc.setFont(undefined, 'bold');
        doc.text(`${s}:`, 20, yPos);
        doc.setFont(undefined, 'normal');
        doc.text(`${qtd} atendimentos (${perc}%)`, 60, yPos);
        yPos += 6;
    });

    // --- SEÇÃO 2: GRÁFICO DE SERVIÇOS ---
    const imgServicos = document.getElementById('chartServicos').toDataURL("image/png", 1.0);
    doc.setFont(undefined, 'bold');
    doc.text("2. Distribuição por Tipo de Serviço (Proporção)", 14, 160);
    doc.addImage(imgServicos, 'PNG', 20, 165, 80, 80); 

    // Legenda Detalhada ao lado do gráfico de rosca
    let yPosServ = 175;
    const servLab = [...new Set(dados.map(d => d.servico))];
    servLab.forEach(serv => {
        const qtd = dados.filter(d => d.servico === serv).length;
        const perc = totalGeral > 0 ? ((qtd / totalGeral) * 100).toFixed(1) : 0;
        doc.setFont(undefined, 'bold');
        doc.text(`${serv}:`, 110, yPosServ);
        doc.setFont(undefined, 'normal');
        doc.text(`${qtd} un. (${perc}%)`, 160, yPosServ);
        yPosServ += 6;
        if(yPosServ > 280) { doc.addPage(); yPosServ = 20; }
    });

    dashboard.style.display = visualOriginal; 
    doc.save("Relatorio_Graficos_CRAS_Com_Valores.pdf");
}

        function toggleDashboard() {
            const db = document.getElementById('dashboard');
            db.style.display = db.style.display === 'block' ? 'none' : 'block';
            if (db.style.display === 'block') renderizarGraficos();
        }


        //INICIO DOS AJUSTES PARA CONTER VALORES NOS GRAFICOS
      function renderizarGraficos() {
    const dados = JSON.parse(localStorage.getItem(DB_NAME)) || [];
    const setoresLab = ["CADASTRO ÚNICO", "ASSISTENTE SOCIAL", "PSICOLOGA"];
    const setoresVal = setoresLab.map(s => dados.filter(d => d.setor === s).length);
    
    if (grafSetores) grafSetores.destroy();
    grafSetores = new Chart(document.getElementById('chartSetores'), {
        type: 'bar',
        data: {
            labels: setoresLab,
            datasets: [{ 
                label: 'Atendimentos', 
                data: setoresVal, 
                backgroundColor: ['#3498db', '#e67e22', '#9b59b6'] 
            }]
        },
        options: { 
            animation: false, 
            plugins: { 
                title: { display: true, text: 'Demanda por Setor (Qtd Total)' }
            } 
        }
    });

    const servLab = [...new Set(dados.map(d => d.servico))];
    const servVal = servLab.map(s => dados.filter(d => d.servico === s).length);

    if (grafServicos) grafServicos.destroy();
    grafServicos = new Chart(document.getElementById('chartServicos'), {
        type: 'doughnut',
        data: {
            labels: servLab,
            datasets: [{ 
                data: servVal, 
                backgroundColor: ['#27ae60', '#f1c40f', '#e74c3c', '#1abc9c', '#34495e', '#e67e22', '#9b59b6'] 
            }]
        },
        options: { 
            animation: false, 
            plugins: { 
                title: { display: true, text: 'Distribuição por Serviço (%)' }
            } 
        }
    });
}
        //FINAL DOS AJUSTES PARA CONTER VALORES NOS GRAFICOS

        function atualizarCards() {
            const dados = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            const setores = ["CADASTRO ÚNICO", "ASSISTENTE SOCIAL", "PSICOLOGA"];
            document.getElementById('summaryBox').innerHTML = setores.map(s => `
                <div class="card"><h4>${s}</h4><p>${dados.filter(d => d.setor === s).length}</p></div>
            `).join('');
        }

        function exportarExcel() {
            const dados = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            const ws = XLSX.utils.json_to_sheet(dados);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Atendimentos");
            XLSX.writeFile(wb, "Relatorio_CRAS.xlsx");
        }

        function limparBancoCompleto() {
            if (confirm("Apagar todos os dados do sistema?")) {
                localStorage.removeItem(DB_NAME);
                carregarDados();
            }
        }

        function salvarBackup() {
            const dados = localStorage.getItem(DB_NAME);
            const blob = new Blob([dados], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Backup_CRAS_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importarBackup(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem(DB_NAME, e.target.result);
                carregarDados();
                alert("Dados importados!");
            };
            reader.readAsText(file);
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
